_target_: navsim.agents.rap_dino.rap_agent.RAPAgent
_convert_: 'all'

config:
  _target_: navsim.agents.rap_dino.navsim_config.RAPConfig
  _convert_: 'all'

  trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: 'all'
    time_horizon: 4
    interval_length: 0.5

  latent: False
  distill_feature: False
  pdm_scorer: True
  cache_data: False
  train_metric_cache_path: './train_metric_cache'
  ref2d_observation_aug: False
  ref2d_aug_y_range: [-1.0, 1.0]
  ref2d_aug_prob: 1.0
  ref2d_shift_sampling_mode: log_hash
  recovery_target_enabled: False
  recovery_aux_enabled: True
  recovery_aux_weight: 0.3

checkpoint_path: ''
lr: 1e-4
